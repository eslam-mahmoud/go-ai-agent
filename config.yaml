poll_interval_seconds: 15

concurrency:
  enabled: false
  max_parallel: 1

labels:
  ready: ready
  in_progress: in-progress
  awaiting_feedback: awaiting-feedback
  done: done

repos:
  - eslam-mahmoud/go-ai-agent

context_dir: .claude-context

claude:
  bin: ""                     # path to claude CLI binary; defaults to "claude" on PATH
  output_format: stream-json  # always paired with --verbose
  max_turns: 40               # caps agentic turns per invocation
  run_timeout: 30m            # external wrapper; Claude Code has no built-in cap
  auto_compact: false         # Madar manages context via artifacts + session rotation
  context_reset_threshold: 0.6  # fraction of model window at which to checkpoint and rotate
  skip_permissions: true      # trusted single-user box — skip interactive permission prompts
  max_thread_chars: 8000      # max chars of human thread passed to first-run prompt (oldest omitted first)
  max_issue_body_chars: 4000  # max chars of issue body in first-run prompt (truncated with marker)

ci:
  enabled: false       # set true to enable CI/CD feedback loop
  max_retries: 3       # re-invoke Claude up to N times on CI failure
  poll_interval: 30s   # how often to check check suite status
  wait_timeout: 20m    # give up waiting for CI after this long

db_path: ./madar.db
workspace_dir: ./workspaces
